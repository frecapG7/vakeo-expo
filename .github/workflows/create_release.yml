name: Vakeo App Production Release

on:
  workflow_dispatch:
    inputs:
      version-bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new-version: ${{ steps.version.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4.0.2
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        id: version
        env:
          VERSION_BUMP: ${{ github.event.inputs.version-bump }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version $VERSION_BUMP -m "Release v%s"
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          git push
          git push --tags

  build-android:
    needs: version-bump
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.version-bump.outputs.new-version }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4.0.2
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android
        run: eas build --platform android --non-interactive --profile production --local --output app-release.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: vakeo-android-${{ needs.version-bump.outputs.new-version }}
          path: app-release.aab

      - name: Submit to Google Play
        run: |
          echo '${{ secrets.ANDROID_SERVICE_ACCOUNT_JSON }}' > service-account.json
          eas submit --platform android --path app-release.aab --non-interactive --profile production

  build-ios:
    needs: version-bump
    runs-on: macos-latest
    steps:
      - name: Setup xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.version-bump.outputs.new-version }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4.0.2
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build iOS
        run: eas build --platform ios --non-interactive --profile production --local --output app-release.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: vakeo-ios-${{ needs.version-bump.outputs.new-version }}
          path: app-release.ipa

      - name: Submit to App Store
        run: |
          mkdir -p asc
          echo '${{ secrets.APP_STORE_CONNECT_API_KEY }}' > asc/key.p8
          eas submit --platform ios --path app-release.ipa --non-interactive --profile production --asc-api-key-path asc/key.p8
